<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>拾陸：時光修復師 | 太平老街全紀實</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --vintage-gold: #D68F66;
            --text-dark: #2C2928;
            --white-glass: rgba(255, 255, 255, 0.95);
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Noto Serif TC', serif; background: #000; overflow: hidden; }

        /* ==============================
           🖼️ 背景核心設定：保證不裁切 + 拉伸填滿
           ============================== */
        #game-stage {
            width: 100vw; height: 100vh;
            position: relative;
            /* 關鍵：100% 100% 強制圖片對齊螢幕邊緣，完全不裁切 */
            background-size: 100% 100%; 
            background-repeat: no-repeat;
            background-position: center center;
            
            transition: filter 1s ease, background-image 0.8s ease-in-out;
            display: flex; flex-direction: column; justify-content: flex-end;
        }

        .past-filter { filter: sepia(0.5) contrast(1.1) brightness(0.8); }

        /* UI 元件 - 電腦版 */
        .top-ui {
            position: absolute; top: 20px; width: 100%;
            display: flex; justify-content: space-between; padding: 0 30px; box-sizing: border-box;
            z-index: 100;
        }
        .left-ui-group { display: flex; gap: 15px; align-items: center; }
        .home-btn {
            background: var(--white-glass); border: 2px solid var(--vintage-gold);
            padding: 8px 15px; border-radius: 50px; cursor: pointer;
            font-family: inherit; font-weight: bold; color: var(--text-dark);
            text-decoration: none; font-size: 0.9rem; display: flex;
            align-items: center; gap: 5px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); transition: 0.3s;
        }
        .status-badge {
            background: var(--white-glass); padding: 10px 20px; border-radius: 50px;
            font-weight: bold; color: var(--text-dark); box-shadow: 0 4px 15px rgba(0,0,0,0.3); backdrop-filter: blur(5px);
        }

        #inventory { display: flex; gap: 10px; }
        .item-slot {
            width: 50px; height: 50px; background: rgba(0,0,0,0.6);
            border: 2px solid var(--vintage-gold); border-radius: 10px;
            display: flex; align-items: center; justify-content: center; font-size: 20px;
        }

        /* 主角視覺 - 電腦版 */
        .character-container {
            position: relative; width: 100%; display: flex;
            justify-content: flex-start; padding-left: 10%; pointer-events: none; z-index: 10; 
        }
        #player-sprite {
            width: 18vw; max-width: 280px; height: auto; margin-bottom: -15vh; 
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5)); animation: breathe 4s infinite ease-in-out;
        }

        /* 對話框 - 電腦版 */
        .dialogue-box {
            height: 28vh; background: var(--white-glass); margin: 0 20px 20px 20px;
            border-radius: 20px; padding: 25px 45px; box-sizing: border-box;
            position: relative; border: 4px solid var(--vintage-gold); box-shadow: 0 -10px 40px rgba(0,0,0,0.6);
            z-index: 50; backdrop-filter: blur(10px);
        }
        .char-name {
            position: absolute; top: -18px; left: 40px; background: var(--vintage-gold);
            color: white; padding: 5px 25px; border-radius: 10px; font-weight: bold; font-size: 1.1rem;
        }
        .text-content { font-size: 1.2rem; color: var(--text-dark); line-height: 1.6; min-height: 3em; }
        .options { margin-top: 15px; display: flex; gap: 12px; flex-wrap: wrap; }
        .opt-btn {
            padding: 8px 22px; border: 2px solid var(--vintage-gold); background: white;
            border-radius: 50px; cursor: pointer; font-family: inherit; font-weight: bold;
            font-size: 0.95rem; color: var(--text-dark); transition: 0.3s;
        }

        #flash { position: fixed; top:0; left:0; width:100%; height:100%; background: white; opacity: 0; pointer-events: none; z-index: 1000; }

        /* ==============================
           📱 手機版專屬修正 (不裁切背景 + 拉伸)
           ============================== */
@media (max-width: 768px) {
    #game-stage {
        background-size: contain; /* 核心：不放大圖片，完整呈現 */
        background-repeat: no-repeat;
        background-position: center 15%; /* 讓圖片靠上方一點，留位置給下面的對話框 */
        background-color: #1a1a1a; /* 圖片沒填滿的地方用黑色補 */
    }
            .top-ui { padding: 0 15px; top: 10px; flex-direction: column; align-items: flex-start; gap: 5px; }
            .home-btn { font-size: 1.1rem; padding: 10px 18px; }
            .status-badge { font-size: 1rem; padding: 8px 18px; }

            #player-sprite {
                width: 32vw; 
                margin-bottom: -5vh; 
            }

            .dialogue-box {
                height: 40vh; 
                padding: 35px 25px 20px 25px;
                margin: 0 10px 10px 10px;
            }
            .char-name { font-size: 1.3rem; top: -18px; left: 25px; }
            .text-content { font-size: 1.25rem; line-height: 1.5; }
            
            .opt-btn {
                font-size: 1.2rem;
                padding: 15px;
                width: 100%; 
                text-align: center;
            }
        }

        @keyframes breathe {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
    </style>
</head>
<body>
    <div id="flash"></div>
    <div id="game-stage">
        <div class="character-container">
            <img id="player-sprite" src="7.png" alt="修復師主角">
        </div>
        <div class="top-ui">
            <div class="left-ui-group">
                <a href="index.html" class="home-btn">🏠 返回首頁</a>
                <div class="status-badge" id="current-info">太平老街探索</div>
            </div>
            <div id="inventory">
                <div class="item-slot" id="slot-camera">📷</div>
                <div id="slot-item" class="item-slot"></div>
            </div>
        </div>
        <div class="dialogue-box">
            <div class="char-name" id="speaker">時光修復師</div>
            <div class="text-content" id="dialogue-text">正在對齊時空座標...</div>
            <div class="options" id="options-container"></div>
        </div>
    </div>

<script>
    /* 腳本邏輯部分 (同前) */
    const state = { location: 'farmers_assoc', isPast: false, isTalking: false };
    const script = {
        'farmers_assoc': {
            modern: { bg: '4.jpg', text: "站在西市場門口的農會前。這棟純白色的建築雖然為了維持整潔感而粉刷，但右側加蓋的部分顯得並不對稱。", speaker: "主角", opts: [{ text: "📷 穿梭到 1914 年", action: 'shutter' }, { text: "繼續前行", next: 'phantom_chen' }] },
            past: { bg: 'past_farmers.jpg', text: "回到了 1914 年。當時的『信用組合』竟然是優雅的淡綠色牆面。", speaker: "主角", opts: [{ text: "📷 回到現代", action: 'shutter' }] }
        },
        'phantom_chen': {
            modern: { bg: '8.png', text: "據說這裡曾有一座驚艷斗六的宅邸。", speaker: "主角", opts: [{ text: "📷 召喚 1920 年代的記憶", action: 'shutter' }] },
            past: { bg: '2.jpg', text: "出現了！這就是陳林氏寶宅。山牆展現出強烈的巴洛克風情。", speaker: "主角", opts: [{ text: "觀察細節", next: 'chen_detail' }] }
        },
        'chen_detail': {
            past: { bg: '2.jpg', text: "這座融合了意志與財力的傑作，在時光中消失真的太可惜了。", speaker: "主角", opts: [{ text: "📷 回到現代", action: 'shutter' }] }
        },
        'street_walk': {
            modern: { bg: '3.jpg', text: "沿著太平路走。這一段的山牆繁複，深受巴洛克風格影響。", speaker: "主角", opts: [{ text: "抵達劉仁德老宅", next: 'liu_house' }] }
        },
        'liu_house': {
            modern: { bg: '10.jpg', text: "抵達 1928 年建造的劉宅。灰色立面、酒瓶欄杆，線條簡潔。", speaker: "主角", opts: [{ text: "與小葉交談", next: 'talk_yeh' }] }
        },
        'talk_yeh': {
            modern: { bg: '10.jpg', text: "小葉：『這座壯麗的大木結構，需要請教劉老先生。』", speaker: "小葉", opts: [{ text: "📷 穿梭見劉老先生", action: 'shutter' }] }
        },
        'past_liu': {
            past: { bg: '10.jpg', text: "劉老先生：『孩子，根基要穩，家才不會散。』", speaker: "劉老先生", opts: [{ text: "記錄秘密並回到現代", action: 'finish_quest' }] }
        },
        'modern_finale': {
            modern: { bg: '5.png', text: "修復完成。現在這裡飄著咖啡香，小吟笑著遞上一杯咖啡。", speaker: "主角", opts: [{ text: "與小吟聊聊", next: 'talk_吟' }] }
        },
        'talk_吟': {
            modern: { bg: '5.png', text: "小吟：『謝謝妳讓阿祖的名字能繼續留在太平老街。』", speaker: "小吟", opts: [{ text: "完成之旅", action: 'end' }] }
        }
    };

    function typeWriter(text) {
        if (state.isTalking) return;
        state.isTalking = true;
        const el = document.getElementById('dialogue-text');
        const optContainer = document.getElementById('options-container');
        optContainer.style.opacity = 0;
        el.innerText = '';
        let i = 0;
        function type() {
            if (i < text.length) {
                el.innerText += text.charAt(i); i++;
                setTimeout(type, 35);
            } else {
                state.isTalking = false;
                optContainer.style.opacity = 1;
            }
        }
        type();
    }

    function render() {
        const timeKey = state.isPast ? 'past' : 'modern';
        let sceneKey = state.location;
        if (state.isPast && sceneKey === 'talk_yeh') sceneKey = 'past_liu';
        if (!state.isPast && sceneKey === 'chen_detail') sceneKey = 'street_walk';
        const scene = script[sceneKey][timeKey] || script[sceneKey]['modern'];
        const stage = document.getElementById('game-stage');
        if (scene.bg) stage.style.backgroundImage = `url('${scene.bg}')`;
        state.isPast ? stage.classList.add('past-filter') : stage.classList.remove('past-filter');
        document.getElementById('speaker').innerText = scene.speaker;
        document.getElementById('current-info').innerText = state.isPast ? "時空回溯中" : "太平老街探索中";
        typeWriter(scene.text);
        const optContainer = document.getElementById('options-container');
        optContainer.innerHTML = '';
        scene.opts.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn'; btn.innerText = opt.text;
            btn.onclick = () => {
                if (opt.action === 'shutter') shutterEffect();
                else if (opt.action === 'finish_quest') {
                    document.getElementById('slot-item').innerText = '🏗️';
                    state.location = 'modern_finale';
                    if (state.isPast) shutterEffect(); else render();
                } else if (opt.action === 'end') {
                    alert("遊戲結束：太平老街的記憶已被妳溫柔守護。");
                    window.location.reload();
                } else { state.location = opt.next; render(); }
            };
            optContainer.appendChild(btn);
        });
    }

    function shutterEffect() {
        const flash = document.getElementById('flash');
        flash.style.opacity = 1;
        setTimeout(() => { flash.style.opacity = 0; state.isPast = !state.isPast; render(); }, 300);
    }
    render();
</script>
</body>
</html>
