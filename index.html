<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拾陸 - 歷史建築導覽</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --sunset-milk: #D68F66;
            --bg-paper: #F8F7F2;
            --text-dark: #2C2928;
            --border-light: #D1D1D1;
        }

        /* --- 1. Logo 載入動畫層 --- */
        #loader-wrapper {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: var(--bg-paper);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        .loader-logo-container {
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            animation: logoFadeIn 1.2s ease-out forwards;
        }
        .loader-logo-container img { width: 100px; margin-bottom: 25px; border-radius: 10px; }
        .loader-slogan { font-family: 'Noto Serif TC', serif; letter-spacing: 0.2rem; font-weight: 500; }
        @keyframes logoFadeIn { to { opacity: 1; transform: translateY(0); } }
        .loader-hidden { opacity: 0; visibility: hidden; pointer-events: none; }

        body { margin: 0; background-color: var(--bg-paper); font-family: 'Noto Serif TC', serif; color: var(--text-dark); overflow-x: hidden; }

        /* --- 2. 封面全屏輪播 (改為 2/3 高度) --- */
        .hero-container {
            width: 100%;
            height: 66.67vh; /* 設定為螢幕高度的 2/3 */
            position: relative;
            overflow: hidden;
            background-color: #000;
        }
        .hero-slideshow {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }
        .hero-slideshow-img {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover; /* 填滿畫面 */
            object-position: center; /* 以中心點對齊，若要避開裁切重要部位可改為 top 或 bottom */
            opacity: 0;
            animation: imageSlideshow 20s infinite linear;
        }
        .hero-slideshow-img:nth-child(1) { animation-delay: 0s; }
        .hero-slideshow-img:nth-child(2) { animation-delay: 5s; }
        .hero-slideshow-img:nth-child(3) { animation-delay: 10s; }
        .hero-slideshow-img:nth-child(4) { animation-delay: 15s; }

        @keyframes imageSlideshow {
            0% { opacity: 0; }
            5% { opacity: 1; }
            25% { opacity: 1; }
            30% { opacity: 0; }
            100% { opacity: 0; }
        }

        .hero-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.15);
            z-index: 2;
        }

        /* --- 3. 吸頂導覽列 --- */
        .nav-container {
            width: 100%;
            background: var(--bg-paper);
            border-bottom: 1px solid var(--border-light);
            position: sticky;
            top: 0; z-index: 1000;
        }
        .nav-grid {
            display: flex; justify-content: center; gap: 40px;
            max-width: 1200px; margin: 0 auto; padding: 20px;
        }
        .nav-item {
            text-decoration: none; color: var(--text-dark);
            font-size: 16px; font-weight: 500; letter-spacing: 0.1rem;
            position: relative; transition: color 0.3s;
        }
        .nav-item:hover { color: var(--sunset-milk); }
        .nav-item::after {
            content: ''; position: absolute; bottom: -5px; left: 0;
            width: 0; height: 1.5px; background: var(--sunset-milk);
            transition: width 0.3s;
        }
        .nav-item:hover::after { width: 100%; }

        /* --- 4. 內容區塊 --- */
        .section-header { max-width: 1200px; margin: 40px auto 20px; padding: 0 20px; }
        .section-title {
            display: inline-block;
            font-weight: 900; font-size: 1.4rem; color: white; 
            background-color: var(--sunset-milk); 
            padding: 10px 30px; border-radius: 50px;
            letter-spacing: 0.15rem;
        }

        .building-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 30px; max-width: 1200px; margin: 0 auto; padding: 0 20px 80px;
        }
        .building-card {
            background: white; border-radius: 12px; overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: 0.3s; cursor: pointer;
        }
        .building-card:hover { transform: translateY(-5px); }
        .card-thumb { height: 200px; overflow: hidden; }
        .card-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .card-content { padding: 20px; }
        .card-content h3 { margin: 0 0 10px; font-size: 1.2rem; }
        .card-content p { font-size: 14px; color: #666; line-height: 1.7; }

        footer { text-align: center; padding: 40px 20px; color: #aaa; font-size: 12px; border-top: 1px solid var(--border-light); }

        @media (max-width: 768px) {
            .hero-container { height: 40vh; }
            .nav-grid { gap: 15px; flex-wrap: wrap; justify-content: center; }
        }
    </style>
</head>
<body>

    <div id="loader-wrapper">
        <div class="loader-logo-container">
            <img src="11.png" alt="Logo"> 
            <div class="loader-slogan">拾得古建築的風骨，閱讀斗六的靈魂。</div>
        </div>
    </div>

    <div class="container">
        <div class="hero-container">
            <div class="hero-slideshow">
                <img src="1.png" class="hero-slideshow-img">
                <img src="4.png" class="hero-slideshow-img">
                <img src="3.png" class="hero-slideshow-img">
                <img src="9.png" class="hero-slideshow-img">
            </div>
            <div class="hero-overlay"></div>
        </div>

        <div class="nav-container">
            <nav class="nav-grid">
                <a href="page11.html" class="nav-item">關於我們</a>
                <a href="page13.html" class="nav-item">主題介紹</a>
                <a href="page12.html" class="nav-item">導覽地圖</a>
                <a href="page14.html" class="nav-item">遊戲體驗</a>
                <a href="page16.html" class="nav-item">影片觀賞</a>
                <a href="page15.html" class="nav-item">參考資料</a>
            </nav>
        </div>

        <div class="section-header">
            <div class="section-title">經典建築巡禮</div>
        </div>
        
        <div class="building-grid">
            <div class="building-card" onclick="location.href='page01.html';">
                <div class="card-thumb"><img src="2.jpg"></div>
                <div class="card-content">
                    <h3>陳林氏寶宅</h3>
                    <p>採用傳統閩南式的「二進左右護龍」格局。外圍有高聳的紅磚牆，內部則有寬敞的內埕（前院）。</p>
                </div>
            </div>
            <div class="building-card" onclick="location.href='page02.html';">
                <div class="card-thumb"><img src="3.jpg"></div>
                <div class="card-content">
                    <h3>山牆</h3>
                    <p>明治到大正時期受巴洛克式影響的清水紅磚與華麗立面山牆的建築。</p>
                </div>
            </div>
            <div class="building-card" onclick="location.href='page03.html';">
                <div class="card-thumb"><img src="4.jpg"></div>
                <div class="card-content">
                    <h3>斗六農會</h3>
                    <p>百年歷史建築，結合實用主義與時代美學。</p>
                </div>
            </div>
            <div class="building-card" onclick="location.href='page04.html';">
                <div class="card-thumb"><img src="5.png"></div>
                <div class="card-content">
                    <h3>仁德咖啡</h3>
                    <p>斗六最具代表性的百年街屋，日治時期老宅。</p>
                </div>
            </div>
        </div>

        <footer><p>Copyright © 2026 拾陸團隊版權所有</p></footer>
    </div>

    <script>
        (function() {
            const loader = document.getElementById("loader-wrapper");
            const isInternal = sessionStorage.getItem("is_internal");

            if (isInternal === "true") {
                loader.style.display = "none";
                sessionStorage.removeItem("is_internal");
            } else {
                window.addEventListener("load", function() {
                    setTimeout(() => {
                        loader.classList.add("loader-hidden");
                    }, 1500); 
                });
            }

            window.addEventListener("beforeunload", function() {
                sessionStorage.setItem("is_internal", "true");
            });
        })();
    </script>
</body>
</html>
