<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拾陸 - 歷史建築導覽</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --sunset-milk: #D68F66;
            --muted-green: #7BA08E;
            --faded-cherry: #B55D5D;
            --bg-paper: #F8F7F2;
            --text-dark: #2C2928;
            --card-shadow: 0 10px 30px rgba(0,0,0,0.06);
        }

        body {
            margin: 0;
            background-color: var(--bg-paper);
            font-family: 'Noto Serif TC', serif;
            color: var(--text-dark);
            overflow-x: hidden;
        }

        /* --- 1. 封面區 (Desktop) --- */
        .hero-container {
            width: 100%;
            height: 60vh;
            min-height: 400px;
            overflow: hidden;
            position: relative;
            border-bottom: 8px solid var(--sunset-milk);
            background-color: #fff;
        }

        .hero-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* --- 2. 導覽標籤區 --- */
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            max-width: 1200px;
            margin: 0 auto;
            gap: 20px;
            padding: 40px 20px;
        }

        .nav-item {
            background: white;
            padding: 30px 10px;
            border-radius: 20px;
            text-align: center;
            text-decoration: none;
            color: var(--text-dark);
            box-shadow: var(--card-shadow);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid transparent;
        }

        .nav-item:hover {
            transform: translateY(-8px);
            border-color: var(--sunset-milk);
            background-color: #fffaf8;
        }

        .nav-item span {
            font-size: 38px;
            display: block;
            margin-bottom: 10px;
        }

        /* --- 3. 建築介紹區 --- */
        .section-header { max-width: 1200px; margin: 0 auto; padding: 40px 20px 20px; }
        .section-title {
            font-weight: 900; font-size: 1.8rem;
            color: var(--sunset-milk);
            border-left: 6px solid var(--sunset-milk);
            padding-left: 20px;
        }

        .building-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 20px 80px;
        }

        .building-card {
            background: white;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: var(--card-shadow);
            transition: 0.3s ease;
        }

        .building-card:hover {
            transform: scale(1.02);
        }

        .card-thumb {
            height: 220px;
            overflow: hidden;
            background: #eee;
        }
        
        .card-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-content { padding: 25px; }
        .card-content h3 { margin: 0 0 12px; font-weight: 700; }
        .card-content p { font-size: 15px; color: #666; line-height: 1.8; }

        /* --- 4. 底部資訊與 LINE --- */
        footer {
            text-align: center;
            padding: 40px;
            color: #aaa;
            font-size: 14px;
        }

        .line-float {
            position: fixed; right: 40px; bottom: 40px;
            width: 80px; height: 80px;
            background-color: var(--faded-cherry);
            border-radius: 50%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            color: white; text-decoration: none;
            font-weight: bold; z-index: 1000;
            box-shadow: 0 10px 20px rgba(181, 93, 93, 0.3);
            transition: 0.3s;
        }

        .line-float:hover { transform: scale(1.1); }

        /* --- 5. RWD 手機版優化 --- */
        @media (max-width: 768px) {
            /* 解決手機版頂部圖片被裁切的問題 */
            .hero-container { 
                height: auto; 
                min-height: 0; 
                border-bottom-width: 4px;
            }
            .hero-container img { 
                height: auto; 
                object-fit: contain; 
            }

            .nav-grid { gap: 10px; padding: 20px 15px; }
            .nav-item { padding: 20px 5px; }
            .nav-item span { font-size: 28px; }

            /* 建築卡片改為橫向滑動或單欄列出 */
            .building-grid { 
                display: flex; 
                overflow-x: auto; 
                padding: 20px; 
                gap: 15px; 
                scroll-snap-type: x mandatory;
            }
            .building-card { 
                flex: 0 0 85%; 
                scroll-snap-align: center;
            }
            
            .line-float { width: 65px; height: 65px; right: 20px; bottom: 20px; font-size: 12px;}
        }
    </style>
</head>
<body>

<div class="container">
    
    <div class="hero-container">
        <img src="1.png" alt="拾陸歷史建築導覽封面">
    </div>

    <nav class="nav-grid">
        <a href="#intro" class="nav-item">
            <span>🏛️</span><b>主題介紹</b>
        </a>
        <a href="#" class="nav-item" onclick="alert('遊戲載入中，敬請期待！')">
            <span>🎮</span><b>遊戲體驗</b>
        </a>
        <a href="#" class="nav-item">
            <span>📍</span><b>導覽地圖</b>
        </a>
    </nav>

    <div class="section-header" id="intro">
        <div class="section-title">經典建築巡禮</div>
    </div>
    
    <div class="building-grid">
        <div class="building-card">
            <div class="card-thumb">
                <img src="2.jpg" alt="陳林氏寶宅">
            </div>
            <div class="card-content">
                <h3>陳林氏寶宅</h3>
                <p>中西合璧代表，精美洗石子裝飾訴說家族榮光。</p>
            </div>
        </div>

        <div class="building-card">
            <div class="card-thumb">
                <img src="3.jpg" alt="山牆">
            </div>
            <div class="card-content">
                <h3>山牆</h3>
                <p>是東亞傳統建築中位於建築物兩側的側牆，因斜屋頂形似「山」字而得名。</p>
            </div>
        </div>

        <div class="building-card">
            <div class="card-thumb">
                <img src="4.jpg" alt="斗六農會">
            </div>
            <div class="card-content">
                <h3>斗六農會</h3>
                <p>斗六市農會的歷史可以追溯至日治時期，至今已有超過百年的發展歷程。</p>
            </div>
        </div>

        <div class="building-card">
            <div class="card-thumb">
                <img src="5.png" alt="仁德咖啡">
            </div>
            <div class="card-content">
                <h3>仁德咖啡</h3>
                <p>咖啡廳所在建築為「劉仁德老宅」，建於 1928 年（昭和 3 年），是斗六最具代表性的百年街屋之一。</p>
            </div>
        </div>
    </div>

    <footer>
        <p>© 拾陸 - 歷史建築導覽設計</p>
        <p style="font-size: 12px; color: #ccc;">建議使用最新版瀏覽器以獲得最佳體驗</p>
    </footer>

    <a href="https://line.me" class="line-float">
        LINE<br><span style="font-size: 10px;">點我連結</span>
    </a>
</div>

</body>
</html>
