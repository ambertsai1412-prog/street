<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>關於拾陸 - 團隊介紹</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --sunset-milk: #D68F66;
            --bg-paper: #F8F7F2;
            --text-dark: #2C2928;
            --border-light: #D1D1D1;
        }

        /* 基礎設定 */
        body { 
            margin: 0; 
            background-color: var(--bg-paper); 
            font-family: 'Noto Serif TC', serif; 
            color: var(--text-dark); 
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* 頂部導覽列 */
        .top-nav {
            position: fixed;
            top: 0; left: 0; width: 100%;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(248, 247, 242, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid var(--border-light);
            box-sizing: border-box;
        }

        .back-btn {
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 700;
            display: flex;
            align-items: center;
            transition: 0.3s;
        }
        .back-btn:hover { color: var(--sunset-milk); transform: translateX(-5px); }
        .back-btn::before { content: '←'; margin-right: 8px; }

        /* 標題區 */
        .hero-section {
            padding: 140px 20px 60px;
            text-align: center;
            background: linear-gradient(to bottom, #f0ede4, var(--bg-paper));
        }

        .section-title {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: 0.5rem;
            margin: 10px 0;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--sunset-milk);
            letter-spacing: 0.2rem;
            font-weight: 700;
        }

        /* --- 團隊故事區 --- */
        .story-box {
            max-width: 800px;
            margin: 0 auto 80px;
            padding: 40px;
            border-left: 5px solid var(--sunset-milk);
            background: white;
            box-shadow: 10px 10px 0px rgba(214, 143, 102, 0.05);
            box-sizing: border-box;
            text-align: left;
        }

        .story-box p {
            margin: 0 0 15px 0;
            font-size: 1.1rem;
            color: #444;
            line-height: 2;
        }

        .story-box p:last-child { margin-bottom: 0; }

        /* 成員卡片容器 */
        .member-container {
            max-width: 1100px;
            margin: 0 auto 100px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            padding: 0 20px;
        }

        .member-card {
            background: white;
            border: 1px solid var(--border-light);
            padding: 40px 25px;
            text-align: center;
            transition: 0.4s ease;
            box-sizing: border-box;
        }

        .member-card:hover {
            border-color: var(--sunset-milk);
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            transform: translateY(-5px);
        }

        .member-photo {
            width: 140px; 
            height: 140px;
            background: #e0e0e0;
            margin: 0 auto 25px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid #eee;
        }

        .member-photo img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: block;
        }

        .role-tag {
            font-size: 0.8rem;
            background: var(--sunset-milk);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .name { 
            font-size: 1.5rem; 
            font-weight: 900; 
            margin: 10px 0; 
            color: var(--text-dark);
        }
        
        .desc {
            font-size: 0.95rem;
            color: #666;
            line-height: 1.8;
            text-align: justify;
        }

        footer { 
            text-align: center; 
            padding: 60px 20px; 
            color: #aaa; 
            font-size: 13px; 
            border-top: 1px solid var(--border-light); 
        }

        @media (max-width: 850px) {
            .member-container { grid-template-columns: 1fr; max-width: 450px; }
            .story-box { margin: 0 20px 60px; padding: 30px 25px; }
            .top-nav { padding: 15px 20px; }
            .section-title { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <nav class="top-nav">
        <a href="index.html" class="back-btn">返回首頁</a>
        <div style="font-weight: 900; letter-spacing: 2px;">拾陸 . ABOUT</div>
    </nav>

    <header class="hero-section">
        <div class="subtitle">WHO WE ARE</div>
        <h1 class="section-title">關於我們</h1>
    </header>

    <main>
        <section class="story-box">
            
            <p>我們是來自雲林科技大學創意生活設計系的學生，想要透過這次的專題，讓大家更了解斗六建築的相關歷史。</p>
        </section>

        <section class="member-container">
            <div class="member-card">
                <div class="member-photo">
                    <img src="15.jpg" alt="江孟璇">
                </div>

                <div class="name">江孟璇</div>
                <div class="desc">
                  負責酷卡製作、故事架構、機關發想與資料查找，透過有趣的故事內容將歷史傳達給讀者們。
              </div>
            </div>

            <div class="member-card">
                <div class="member-photo">
                    <img src="14.jpg" alt="蔡易倫">
                </div>

                <div class="name">蔡易倫</div>
                <div class="desc">
                  負責網站製作與架設、資料查找、機關發想與圖片繪製，利用數位的方式呈現歷史建築有趣的地方。
              </div>
            </div>

            <div class="member-card">
                <div class="member-photo">
                    <img src="13.jpg" alt="蕭聖馨">
                </div>

                <div class="name">蕭聖馨</div>
                <div class="desc">
              負責立體結構研發、標準字設計、機關發想與角色設計，將現實的歷史建築以紙雕的方式呈現給讀者。 </div>
            </div>
        </section>
    </main>

    <footer>
      <p>Copyright © 2026 拾陸團隊版權所有</p>
    </footer>

</body>
</html>
